name: Scheduled correctness

on:
  workflow_dispatch:
  # https://crontab.guru/#0_3_*_*_*
  # "At 03:00." — every day (3AM avoids DST transition window)
  schedule:
    - cron: "0 3 * * *"

jobs:
  binding-tester:
    if: github.repository == 'amirouche/asyncio-foundationdb'
    uses: ./.github/workflows/_binding-tester.yaml
    with:
      iterations: 300
