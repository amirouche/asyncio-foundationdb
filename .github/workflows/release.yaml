name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    name: Build wheel (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install FoundationDB
        run: sudo make debian

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip > /dev/null
          pip install uv
          make init

      - name: Run tests
        run: make check

      - name: Build wheel
        run: uv build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.arch }}
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish to PyPI
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Publish
        run: |
          pip install uv
          uv publish dist/* --token ${{ secrets.PYPI }}
