name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  verify-on-main:
    runs-on: ubuntu-latest
    name: Verify tag is on main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tagged commit is reachable from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main

  sdist:
    needs: verify-on-main
    runs-on: ubuntu-latest
    name: Build sdist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheel-linux:
    needs: verify-on-main
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    name: Build wheel (linux-${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: sudo make debian
      - run: pip install uv && uv build --wheel
      - run: pip install auditwheel && auditwheel repair dist/*.whl --plat manylinux_2_17_$(uname -m) --exclude libfdb_c.so -w dist/ && rm dist/*linux_$(uname -m).whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.arch }}
          path: dist/*.whl

  wheel-macos:
    needs: verify-on-main
    runs-on: macos-latest
    name: Build wheel (macos-arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: sudo make macos
      - run: pip install uv && uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/*.whl

  publish:
    needs: [sdist, wheel-linux, wheel-macos]
    runs-on: ubuntu-latest
    name: Publish to PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
          merge-multiple: true
      - run: pip install uv && uv publish dist/* --token ${{ secrets.PYPI }}
