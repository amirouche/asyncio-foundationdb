[project]
name = "asyncio-foundationdb"
version = "0.13.0"
description = "FoundationDB drivers for asyncio"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Amirouche A. BOUBEKKI", email = "amirouche.boubekki@gmail.com" },
]

requires-python = ">=3.9"

dependencies = [
    "aiostream",
    "cffi",
    "foundationdb",
    "immutables",
    "loguru",
    "more-itertools",
    "uuid7",
    "uvicorn",
    "zstandard",
    "jinja2",
    "typing-extensions>=4.12.0",
]

[project.optional-dependencies]
dev = [
    "bandit>=1.9; python_version>='3.10'",
    "black",
    "isort",
    "pylama",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "setuptools",
]

[build-system]
requires = ["poetry-core", "setuptools", "cffi"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "found" }]
build = "found/ffibuild.py"

[tool.poetry.group.dev.dependencies]
bandit = {version = ">=1.9", python = ">=3.10"}
black = "*"
isort = "*"
pylama = "*"
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"
setuptools = "*"
