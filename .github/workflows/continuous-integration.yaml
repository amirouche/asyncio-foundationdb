name: Continuous Integration

on:
    push:

env:
  GH_TOKEN: ${{ github.token }}
  GIT_OBJECT: ${{ github.head_ref || github.ref_name }}
  PYTHON_GIL: "0"

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
          - "pypy-3.9"
          - "pypy-3.10"
          - "pypy-3.11"
        os:
          - ubuntu-latest
    runs-on:  ${{ matrix.os }}
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    steps:
      - run: gh repo clone amirouche/asyncio-foundationdb -- found
      - run: cd found && git checkout $GIT_OBJECT
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
           python-version: ${{ matrix.python-version }}
           architecture: x64
      - run: python --version
      - run: cd found && sudo make debian
      - run: python3 -m pip install --upgrade pip > /dev/null
      - run: pip install uv
      - run: cd found && make init
      - run: cd found && uv run python readme.py
      - run: cd found && make check
